name: Release Please
permissions:
  contents: write
  pull-requests: write
on:
  push:
    branches:
      - main
jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: .github/release-please-config.json
          manifest-file: version.json
  build:
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - name: Build WSL image
        run: |
          NIX_PATH=$(which nix)
          sudo -E $NIX_PATH run .#nixosConfigurations.wsl.config.system.build.tarballBuilder --print-build-logs
      - name: Rename artifact
        run: |
          VERSION="${{ needs.release.outputs.tag_name }}"
          mv nixos.wsl "nixos-${VERSION}.wsl"
      - name: Upload to existing release & Publish
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release.outputs.tag_name }}
          files: nixos-${{ needs.release.outputs.tag_name }}.wsl
